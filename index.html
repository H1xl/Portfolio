    <!-- Fonts: Unbounded (display), Manrope (body), JetBrains Mono (mono) — с кириллицей.
         Асинхронная загрузка, чтобы не блокировать первичный рендер. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap"
      />
    </noscript>

    <!-- Инициализация темы/языка до первой отрисовки (без мигания) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var l = localStorage.getItem('lang');
          document.documentElement.setAttribute('lang', l === 'en' ? 'en' : 'ru');
        } catch (e) {}
      })();
    </script>

    <title>Александр Хоменко — Frontend / Fullstack разработчик</title>

    <script type="application/ld+json">

      }
    </script>
